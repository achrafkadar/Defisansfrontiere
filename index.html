<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Defisansfrontiere — un projet qui repousse les limites."
    />
    <title>Defisansfrontiere</title>
    <link rel="stylesheet" href="styles.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,600;0,9..40,700;1,9..40,400&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div class="noise" aria-hidden="true"></div>
    <header class="top">
      <span class="logo">Defisansfrontiere</span>
      <a class="ghost-link" href="https://github.com/achrafkadar/Defisansfrontiere">GitHub</a>
    </header>

    <main class="hero">
      <p class="eyebrow">Bienvenue</p>
      <h1>Des idées sans frontières.</h1>
      <p class="lede">
        Une base simple pour présenter le projet, itérer sur le design et
        déployer quand vous serez prêt.
      </p>
      <div class="actions">
        <a class="btn primary" href="#contact">Nous écrire</a>
        <a class="btn secondary" href="https://github.com/achrafkadar/Defisansfrontiere"
          >Voir le dépôt</a
        >
      </div>
    </main>

    <section id="contact" class="panel">
      <h2>Contact</h2>
      <p>
        Pour l’instant, la meilleure porte d’entrée reste le dépôt GitHub ci-dessus.
      </p>
    </section>

    <footer class="foot">
      <span>© <span id="year"></span> Defisansfrontiere</span>
    </footer>

    <script>
      document.getElementById("year").textContent = new Date().getFullYear();
    </script>
  </body>
</html>
